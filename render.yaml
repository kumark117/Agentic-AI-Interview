services:
  - type: web
    name: ai-agentic-interview-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: AI_INTERVIEW_MODE
        value: remote
      - key: AI_INTERVIEW_DISABLE_CLEANUP_WORKER
        value: "false"
      - key: AI_INTERVIEW_CORS_ORIGINS
        sync: false
      - key: AI_INTERVIEW_POSTGRES_DSN
        sync: false
      - key: AI_INTERVIEW_REDIS_DSN
        sync: false
